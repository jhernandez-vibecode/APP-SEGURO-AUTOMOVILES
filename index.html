<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <!-- ETIQUETAS ANTI-CACHÉ (Para forzar a los celulares a ver los cambios) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>Asistencia Seguro Automóviles</title>
  
  <!-- Tailwind CSS para los estilos -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome para los íconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React y ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel para que el navegador entienda React sin necesidad de compilar -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel">
    // =========================================================================
    // ZONA DE CONFIGURACIÓN (FÁCIL DE EDITAR PARA TU HERMANO)
    // Dile a tu hermano que solo debe editar lo que está aquí adentro:
    // =========================================================================
    const CONFIG = {
      // 1. Para OCULTAR toda la leyenda del pie de página, cambia true por false
      mostrarLeyenda: false, 
      
      // 2. Personaliza el nombre de la empresa aquí:
      nombreEmpresa: "Agente Christian Hernandez Vargas",
      
      // 3. Personaliza el enlace web (si lo dejas en blanco "", no aparecerá):
      textoEnlace: "www.seguros-ins.com",
      linkEnlace: "https://www.seguros-ins.com",

      // 4. Personaliza el aviso legal (si lo deja en blanco "", no aparecerá):
      leyendaLegal: "© 2026 Propiedad Intelectual de Christian Hernández Vargas. Todos los derechos reservados. Esta plataforma es una herramienta de uso exclusivo para los clientes vinculados a la Licencia Sugese 23-4069. Queda prohibida su reproducción o uso por terceros sin autorización expresa del titular"
    };
    // =========================================================================

    const { useState } = React;

    function App() {
      const [currentView, setCurrentView] = useState('home');

      const renderHeader = () => (
        <header className="bg-blue-900 text-white p-4 shadow-md sticky top-0 z-10">
          <div className="max-w-md mx-auto flex items-center justify-between">
            <div className="flex items-center">
              {currentView !== 'home' && (
                <button onClick={() => setCurrentView('home')} className="p-1 hover:bg-blue-800 rounded px-2 mr-2 transition-colors">
                  <i className="fa-solid fa-chevron-left text-xl"></i>
                </button>
              )}
              {/* Aquí se integra el logo del INS */}
              <img 
                src="INS BLANCO.png" 
                alt="Logo INS" 
                className="h-7 sm:h-8 object-contain" 
                onError={(e) => { e.target.style.display = 'none'; }} 
              />
            </div>
            
            <h1 className="text-xs sm:text-sm font-bold text-right flex-1 leading-tight px-2">
              {currentView === 'home' ? 'Asistencia Seguro Automóviles' : 
               currentView === 'accidente' ? 'Reporte de Accidente' : 
               currentView === 'vial' ? 'Asistencia Vial' : 
               currentView === 'robo' ? 'Robo Total / Parcial' :
               currentView === 'coberturaH' ? 'Vandalismo / Naturaleza' :
               'Contactos Oficiales'}
            </h1>
            <button onClick={() => setCurrentView('contactos')} className="p-1 hover:bg-blue-800 rounded pl-2 transition-colors">
              <i className="fa-solid fa-phone text-xl"></i>
            </button>
          </div>
        </header>
      );

      const renderHome = () => (
        <div className="p-4 max-w-md mx-auto space-y-4">
          
          {/* CUADRO AZUL TENUE (Neuromarketing: Tranquilidad) */}
          <div className="bg-blue-50 border-l-4 border-blue-400 p-4 mb-6 rounded shadow-sm">
            <div className="flex items-center text-blue-800 font-semibold mb-1">
              <i className="fa-solid fa-shield-halved text-xl mr-2"></i>
              ¿Tienes una emergencia?
            </div>
            <p className="text-sm text-blue-900">Selecciona el tipo de asistencia que necesitas en el territorio nacional para guiarte paso a paso.</p>
          </div>

          <button 
            onClick={() => setCurrentView('accidente')}
            className="w-full bg-white border border-gray-200 p-4 rounded-xl shadow-sm hover:shadow-md transition-shadow flex items-center space-x-4 text-left"
          >
            <div className="bg-red-100 p-3 rounded-full text-red-800 flex-shrink-0 w-12 h-12 flex items-center justify-center">
              <i className="fa-solid fa-car text-xl"></i>
            </div>
            <div>
              <h2 className="text-base font-bold text-gray-800">Accidente de Tránsito</h2>
              <p className="text-xs text-gray-500 mt-1">Reporte de choques y guía para el Pacto Amistoso.</p>
            </div>
          </button>

          <button 
            onClick={() => setCurrentView('vial')}
            className="w-full bg-white border border-gray-200 p-4 rounded-xl shadow-sm hover:shadow-md transition-shadow flex items-center space-x-4 text-left"
          >
            <div className="bg-orange-100 p-3 rounded-full text-orange-800 flex-shrink-0 w-12 h-12 flex items-center justify-center">
              <i className="fa-solid fa-screwdriver-wrench text-xl"></i>
            </div>
            <div>
              <h2 className="text-base font-bold text-gray-800">Asistencia Vial (Avería)</h2>
              <p className="text-xs text-gray-500 mt-1">Grúa, cerrajería, batería, llanta o traslado al aeropuerto.</p>
            </div>
          </button>

          <button 
            onClick={() => setCurrentView('robo')}
            className="w-full bg-white border border-gray-200 p-4 rounded-xl shadow-sm hover:shadow-md transition-shadow flex items-center space-x-4 text-left"
          >
            <div className="bg-purple-100 p-3 rounded-full text-purple-800 flex-shrink-0 w-12 h-12 flex items-center justify-center">
              <i className="fa-solid fa-shield text-xl"></i>
            </div>
            <div>
              <h2 className="text-base font-bold text-gray-800">Robo Total o Parcial</h2>
              <p className="text-xs text-gray-500 mt-1">Denuncia ante OIJ, traslados y trámites con el INS.</p>
            </div>
          </button>

          <button 
            onClick={() => setCurrentView('coberturaH')}
            className="w-full bg-white border border-gray-200 p-4 rounded-xl shadow-sm hover:shadow-md transition-shadow flex items-center space-x-4 text-left"
          >
            <div className="bg-teal-100 p-3 rounded-full text-teal-800 flex-shrink-0 w-12 h-12 flex items-center justify-center">
              <i className="fa-solid fa-cloud-showers-heavy text-xl"></i>
            </div>
            <div>
              <h2 className="text-base font-bold text-gray-800">Vandalismo / Cobertura H</h2>
              <p className="text-xs text-gray-500 mt-1">Rayonazos, inundaciones, huracanes, caída de árboles.</p>
            </div>
          </button>
          
          <button 
            onClick={() => setCurrentView('contactos')}
            className="w-full bg-white border border-gray-200 p-4 rounded-xl shadow-sm hover:shadow-md transition-shadow flex items-center space-x-4 text-left"
          >
            <div className="bg-green-100 p-3 rounded-full text-green-800 flex-shrink-0 w-12 h-12 flex items-center justify-center">
              <i className="fa-solid fa-phone text-xl"></i>
            </div>
            <div>
              <h2 className="text-base font-bold text-gray-800">Directorio de Contactos</h2>
              <p className="text-xs text-gray-500 mt-1">Números directos de atención 24/7 en Costa Rica.</p>
            </div>
          </button>
        </div>
      );

      const renderAccidente = () => (
        <div className="p-4 max-w-md mx-auto space-y-6">
          <div className="bg-red-50 border border-red-200 rounded-lg p-4 shadow-sm">
            <h3 className="font-bold text-red-900 flex items-center mb-2">
              <i className="fa-solid fa-triangle-exclamation text-xl mr-2"></i> Paso 1: Reporte Inmediato
            </h3>
            <p className="text-sm text-red-800 mb-3">Si tuviste un choque, <strong>¡NO muevas el vehículo!</strong> (a menos que aplique Pacto Amistoso). Llama de inmediato a:</p>
            
            {/* BOTÓN VERDE */}
            <a href="tel:8008008000" className="block text-center bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-md text-lg transition-colors">
              800-800-8000 (Reporte Accidente)
            </a>
          </div>

          <div className="bg-white border rounded-lg shadow-sm overflow-hidden">
            <div className="bg-blue-50 px-4 py-3 border-b border-blue-100">
              <h3 className="font-bold text-blue-900 flex items-center">
                <i className="fa-solid fa-shield-halved text-xl mr-2 text-blue-600"></i> ¿Aplica Pacto Amistoso?
              </h3>
            </div>
            <div className="p-4 space-y-4">
              <p className="text-sm text-gray-600">Puedes mover el vehículo sin esperar al Oficial de Tránsito SI se cumplen <strong>TODAS</strong> estas condiciones:</p>
              <ul className="text-sm text-gray-700 space-y-2 bg-gray-50 p-3 rounded border border-gray-100">
                <li className="flex items-start"><i className="fa-solid fa-circle-check text-green-500 mr-2 mt-1 flex-shrink-0"></i> Ambos conductores <strong>están de acuerdo</strong> en hacer el arreglo.</li>
                <li className="flex items-start"><i className="fa-solid fa-circle-check text-green-500 mr-2 mt-1 flex-shrink-0"></i> No hay lesionados ni fallecidos.</li>
                <li className="flex items-start"><i className="fa-solid fa-circle-check text-green-500 mr-2 mt-1 flex-shrink-0"></i> No hay bicicletas, motos ni peatones involucrados.</li>
                <li className="flex items-start"><i className="fa-solid fa-circle-check text-green-500 mr-2 mt-1 flex-shrink-0"></i> Ambos vehículos están asegurados y al día.</li>
              </ul>
              
              <div className="border border-blue-200 bg-blue-50 p-3 rounded-lg">
                <h4 className="font-bold text-sm mb-2 text-blue-900 flex items-center"><i className="fa-solid fa-camera mr-2"></i> Pasos para el Pacto:</h4>
                <ol className="text-sm text-blue-800 list-decimal pl-5 space-y-2">
                  <li>Llamar al <strong>800-800-8000</strong> e indicar que desean realizar un Pacto Amistoso.</li>
                  <li>Grabar un <strong>pequeño video 360°</strong> de la escena completa del evento.</li>
                  <li>Tomar las siguientes fotografías:
                    <ul className="list-disc pl-4 mt-1 text-xs space-y-1 text-blue-700">
                      <li>1 foto de cada costado de los vehículos.</li>
                      <li>3 fotos de los daños de cada vehículo.</li>
                      <li>2 fotos panorámicas de la escena y posición.</li>
                    </ul>
                  </li>
                </ol>
                <p className="text-xs font-bold text-blue-900 mt-3 border-t border-blue-200 pt-2">Luego de documentar todo, mueve el vehículo a un lugar seguro y espera al inspector del INS.</p>
              </div>
            </div>
          </div>

          <div className="bg-white border border-red-200 rounded-lg shadow-sm overflow-hidden">
            <div className="bg-red-100 px-4 py-3 border-b border-red-200">
              <h3 className="font-bold text-red-900 flex items-center">
                <i className="fa-solid fa-triangle-exclamation text-xl mr-2"></i> Si NO aplica el Pacto Amistoso
              </h3>
            </div>
            <div className="p-4">
              <ul className="space-y-3 text-sm text-gray-800">
                <li className="flex items-start font-bold text-red-700">
                  <span className="bg-red-200 text-red-900 rounded-full w-5 h-5 flex items-center justify-center text-xs mr-2 flex-shrink-0">1</span>
                  ¡NO MOVER LOS VEHÍCULOS!
                </li>
                <li className="flex items-start">
                  <span className="bg-red-200 text-red-900 rounded-full w-5 h-5 flex items-center justify-center text-xs mr-2 flex-shrink-0">2</span>
                  Llamar a la Policía de Tránsito (117 o 911) para que confeccionen el parte oficial.
                </li>
                <li className="flex items-start">
                  <span className="bg-red-200 text-red-900 rounded-full w-5 h-5 flex items-center justify-center text-xs mr-2 flex-shrink-0">3</span>
                  Llamar al INS (800-800-8000) y esperar al inspector en la escena.
                </li>
              </ul>
            </div>
          </div>

          <div className="bg-white border rounded-lg shadow-sm overflow-hidden">
            <div className="bg-gray-100 px-4 py-3 border-b">
              <h3 className="font-bold text-gray-800 flex items-center">
                <i className="fa-solid fa-clock text-xl mr-2 text-gray-600"></i> Trámites Posteriores
              </h3>
            </div>
            <div className="p-4">
              <ul className="space-y-3 text-sm text-gray-700">
                <li className="flex items-start">
                  <div className="bg-gray-200 text-gray-700 rounded-full w-5 h-5 flex items-center justify-center font-bold text-xs mr-2 flex-shrink-0">1</div>
                  <span>Si no pudiste llamar al momento (Fuerza Mayor), tienes <strong>7 días hábiles</strong> para formalizar el aviso por escrito.</span>
                </li>
                <li className="flex items-start">
                  <div className="bg-gray-200 text-gray-700 rounded-full w-5 h-5 flex items-center justify-center font-bold text-xs mr-2 flex-shrink-0">2</div>
                  <span>Tienes <strong>10 días hábiles</strong> tras el evento para llevar el vehículo a un Centro de Estimación de Daños (CED).</span>
                </li>
              </ul>
            </div>
          </div>
        </div>
      );

      const renderVial = () => (
        <div className="p-4 max-w-md mx-auto space-y-6">
          <div className="bg-orange-50 border border-orange-200 rounded-lg p-4 shadow-sm">
            <h3 className="font-bold text-orange-900 flex items-center mb-2">
              <i className="fa-solid fa-screwdriver-wrench text-xl mr-2"></i> Solicitar Asistencia
            </h3>
            <p className="text-sm text-orange-800 mb-3">Si tu vehículo sufrió una avería mecánica, llama para solicitar asistencia en carretera:</p>
            
            {/* BOTÓN VERDE */}
            <a href="tel:8008008001" className="block text-center bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-md text-lg transition-colors">
              800-800-8001 (Multiasistencia)
            </a>
          </div>

          <div className="bg-white border rounded-lg shadow-sm p-4">
            <h3 className="font-bold text-gray-800 mb-4 border-b pb-2">Servicios Disponibles</h3>
            <ul className="space-y-4 text-sm text-gray-700">
              <li className="flex items-start">
                <i className="fa-solid fa-circle-check text-orange-500 mr-2 mt-1 flex-shrink-0"></i> 
                <span><strong>Remolque y Básicos:</strong> Grúa por avería mecánica, envío de combustible, cambio de llanta estallada, paso de corriente y cerrajería.</span>
              </li>
              <li className="flex items-start bg-blue-50 p-3 rounded-lg border border-blue-100">
                <i className="fa-solid fa-plane text-xl text-blue-600 mr-2 mt-1 flex-shrink-0"></i>
                <div>
                  <span className="font-bold text-blue-900 block mb-1">Taxi al Aeropuerto</span>
                  <span className="text-blue-800">Beneficio de 2 traslados al año. Cada traslado incluye taxi de ida y regreso.</span>
                  <p className="text-xs text-blue-600 font-semibold mt-1">* Aplica únicamente para vehículos con una antigüedad no mayor a 6 años.</p>
                </div>
              </li>
            </ul>
            <p className="text-xs text-gray-400 mt-5 italic border-t pt-3">* Los límites de eventos y distancias de grúa/asistencias dependen del plan contratado (Limitado, Básico o Plus).</p>
          </div>
        </div>
      );

      const renderRobo = () => (
        <div className="p-4 max-w-md mx-auto space-y-6">
          <div className="bg-purple-50 border border-purple-200 rounded-lg p-4 shadow-sm">
            <h3 className="font-bold text-purple-900 flex items-center mb-2">
              <i className="fa-solid fa-shield text-xl mr-2"></i> Paso 1: Denuncia Inmediata
            </h3>
            <p className="text-sm text-purple-800 mb-3">En caso de robo total o parcial, debes presentar la denuncia <strong>inmediatamente</strong> ante el OIJ y reportarlo al INS:</p>
            <div className="space-y-3 mt-3">
              <a href="tel:911" className="block text-center bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 rounded-lg shadow-sm transition-colors">
                Llamar al 911 (OIJ)
              </a>
              {/* BOTÓN VERDE */}
              <a href="tel:8008008000" className="block text-center bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-sm transition-colors">
                800-800-8000 (Reporte INS)
              </a>
            </div>
          </div>

          <div className="bg-white border rounded-lg shadow-sm p-4">
            <h3 className="font-bold text-gray-800 mb-3 border-b pb-2">En caso de Robo Total</h3>
            <ul className="space-y-3 text-sm text-gray-700">
              <li className="flex items-start">
                <i className="fa-solid fa-circle-check text-purple-500 mr-2 mt-1 flex-shrink-0"></i> 
                <span><strong>Beneficio de Transporte:</strong> Puedes llamar al <a href="tel:8008008001" className="text-blue-600 font-bold underline">800-800-8001</a> para solicitar un taxi que te lleve al OIJ a poner la denuncia y luego a tu residencia.</span>
              </li>
              <li className="flex items-start">
                <i className="fa-solid fa-circle-check text-purple-500 mr-2 mt-1 flex-shrink-0"></i> 
                <span><strong>Trámite con el INS:</strong> A los 15 días hábiles de la denuncia, debes presentar al Instituto la certificación del OIJ donde conste que el vehículo no apareció.</span>
              </li>
            </ul>
          </div>

          <div className="bg-white border rounded-lg shadow-sm p-4">
            <h3 className="font-bold text-gray-800 mb-3 border-b pb-2">En caso de Robo Parcial</h3>
            <ul className="space-y-3 text-sm text-gray-700">
              <li className="flex items-start">
                <i className="fa-solid fa-circle-check text-purple-500 mr-2 mt-1 flex-shrink-0"></i> 
                <span>Si el vehículo cuenta con descuento por dispositivo de seguridad (GPS/monitoreo), deberás comprobar que el mismo estaba activo al momento del robo.</span>
              </li>
              <li className="flex items-start">
                <i className="fa-solid fa-circle-check text-purple-500 mr-2 mt-1 flex-shrink-0"></i> 
                <span>Si el vehículo aparece antes del pago de la indemnización, debes solicitar una inspección ocular del OIJ sobre los daños.</span>
              </li>
            </ul>
          </div>
        </div>
      );

      const renderCoberturaH = () => (
        <div className="p-4 max-w-md mx-auto space-y-6">
          <div className="bg-teal-50 border border-teal-200 rounded-lg p-4 shadow-sm">
            <h3 className="font-bold text-teal-900 flex items-center mb-2">
              <i className="fa-solid fa-cloud-showers-heavy text-xl mr-2"></i> ¿Qué incluye la Cobertura H?
            </h3>
            <p className="text-sm text-teal-800 mb-3">Protege tu vehículo contra riesgos adicionales como:</p>
            <ul className="text-sm text-teal-800 list-disc pl-5 space-y-1">
              <li><strong>Daños Vandálicos:</strong> Rayonazos, raspones, sustancias corrosivas, manchas de pintura.</li>
              <li><strong>Naturaleza:</strong> Inundación, ciclón, huracán, temblor, deslizamiento.</li>
              <li><strong>Otros:</strong> Caída de árboles, explosión, incendio, etc.</li>
            </ul>
          </div>

          <div className="bg-red-50 border border-red-200 rounded-lg p-4 shadow-sm">
            <h3 className="font-bold text-red-900 flex items-center mb-2">
              <i className="fa-solid fa-triangle-exclamation text-xl mr-2"></i> Reporte de Daños
            </h3>
            <p className="text-sm text-red-800 mb-3"><strong>No repares ni alteres los daños.</strong> Reporta el evento de inmediato para que un inspector lo valore:</p>
            
            {/* BOTÓN VERDE */}
            <a href="tel:8008008000" className="block text-center bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-md text-lg transition-colors">
              800-800-8000 (Reporte INS)
            </a>
          </div>

          <div className="bg-white border rounded-lg shadow-sm overflow-hidden">
            <div className="bg-gray-100 px-4 py-3 border-b">
              <h3 className="font-bold text-gray-800 flex items-center">
                <i className="fa-solid fa-clock text-xl mr-2 text-gray-600"></i> Trámites Posteriores
              </h3>
            </div>
            <div className="p-4 space-y-4">
              <ul className="space-y-3 text-sm text-gray-700">
                <li className="flex items-start">
                  <div className="bg-gray-200 text-gray-700 rounded-full w-5 h-5 flex items-center justify-center font-bold text-xs mr-2 flex-shrink-0">1</div>
                  <span><strong>Cooperación:</strong> En casos de vandalismo, el INS requiere y puede solicitar tu colaboración adicional para la investigación.</span>
                </li>
                <li className="flex items-start">
                  <div className="bg-gray-200 text-gray-700 rounded-full w-5 h-5 flex items-center justify-center font-bold text-xs mr-2 flex-shrink-0">2</div>
                  <span>Tienes <strong>10 días hábiles</strong> tras el evento para llevar el vehículo a un Centro de Estimación de Daños (CED) para su valoración oficial.</span>
                </li>
              </ul>
            </div>
          </div>
        </div>
      );

      const renderContactos = () => (
        <div className="p-4 max-w-md mx-auto space-y-4">
          <h2 className="text-xl font-bold text-gray-800 mb-4">Directorio Oficial</h2>
          
          <div className="space-y-3">
            <a href="tel:8008008000" className="block bg-white p-4 rounded-lg shadow-sm border border-gray-200 flex items-center justify-between hover:bg-gray-50 active:bg-gray-100 transition-colors">
              <div>
                <h3 className="font-bold text-gray-800 text-base">Reporte de Accidentes</h3>
                <p className="text-xs text-gray-500">Choques / Daños (24/7)</p>
              </div>
              {/* ETIQUETA VERDE */}
              <span className="bg-green-100 text-green-800 px-3 py-1.5 rounded-lg font-bold text-sm">800-800-8000</span>
            </a>

            <a href="tel:8008008001" className="block bg-white p-4 rounded-lg shadow-sm border border-gray-200 flex items-center justify-between hover:bg-gray-50 active:bg-gray-100 transition-colors">
              <div>
                <h3 className="font-bold text-gray-800 text-base">Asistencia Vial</h3>
                <p className="text-xs text-gray-500">Grúa, batería, cerrajero</p>
              </div>
              {/* ETIQUETA VERDE */}
              <span className="bg-green-100 text-green-800 px-3 py-1.5 rounded-lg font-bold text-sm">800-800-8001</span>
            </a>

            <a href="tel:8008353467" className="block bg-white p-4 rounded-lg shadow-sm border border-gray-200 flex items-center justify-between hover:bg-gray-50 active:bg-gray-100 transition-colors">
              <div>
                <h3 className="font-bold text-gray-800 text-base">Consultas Generales</h3>
                <p className="text-xs text-gray-500">Línea Teleins</p>
              </div>
              {/* ETIQUETA VERDE */}
              <span className="bg-green-100 text-green-800 px-3 py-1.5 rounded-lg font-bold text-sm">800-8353467</span>
            </a>
          </div>
          
          <div className="mt-6 bg-gray-50 p-4 rounded-lg border border-gray-200 text-sm text-gray-600 text-center shadow-inner">
            <i className="fa-solid fa-location-dot text-3xl mx-auto text-gray-400 mb-2"></i>
            <p><strong>Oficinas Centrales INS:</strong><br/>Calle 9 y 11, Avenida 7, San José, Costa Rica</p>
            <a href="mailto:contactenos@grupoins.com" className="text-blue-600 font-bold mt-2 block hover:underline">contactenos@grupoins.com</a>
          </div>
        </div>
      );

      return (
        <div className="flex flex-col min-h-screen font-sans text-gray-900 bg-gray-50">
          {renderHeader()}
          <main className="flex-1 pb-8 overflow-x-hidden">
            {currentView === 'home' && renderHome()}
            {currentView === 'vial' && renderVial()}
            {currentView === 'accidente' && renderAccidente()}
            {currentView === 'robo' && renderRobo()}
            {currentView === 'coberturaH' && renderCoberturaH()}
            {currentView === 'contactos' && renderContactos()}

          {CONFIG.mostrarLeyenda && (
            <footer className="bg-gray-800 text-gray-300 py-6 px-4 text-center text-sm mt-auto shadow-inner border-t border-gray-700">
              <p className="mb-1">Esta aplicación pertenece a Agente Christian Hernandez Vargas Lic-23-4069<strong className="text-white">{CONFIG.nombreEmpresa}</strong>.</p>
              {CONFIG.textoEnlace !== "" && (
                <p className="mb-4">
                  Visítenos en{' '}
                  <a

                    {CONFIG.leyendaLegal}

    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
